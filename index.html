<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <script>
      (function() {
        var errorBanner = document.createElement('div');
        errorBanner.id = 'debug-error-banner';
        errorBanner.style.display = 'none';
        errorBanner.style.position = 'fixed';
        errorBanner.style.top = '0';
        errorBanner.style.left = '0';
        errorBanner.style.width = '100%';
        errorBanner.style.background = '#fee2e2';
        errorBanner.style.color = '#991b1b';
        errorBanner.style.padding = '1rem';
        errorBanner.style.zIndex = '99999';
        errorBanner.style.borderBottom = '2px solid #ef4444';
        errorBanner.style.fontFamily = 'monospace';
        errorBanner.style.fontSize = '12px';
        errorBanner.style.whiteSpace = 'pre-wrap';
        errorBanner.style.boxShadow = '0 4px 6px -1px rgb(0 0 0 / 0.1)';
        document.documentElement.appendChild(errorBanner);

        function showError(msg) {
          errorBanner.style.display = 'block';
          errorBanner.innerHTML = '<strong>[Frontend Error]</strong>\n' + msg;
        }

        window.onerror = function(msg, url, line, col, error) {
          showError(msg + '\nAt: ' + url + ':' + line + ':' + col);
          return false;
        };

        window.onunhandledrejection = function(event) {
          showError('Unhandled Promise Rejection: ' + event.reason);
        };
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
